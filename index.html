<!DOCTYPE html>
<html>
<head>
<title>Visitor Counter</title>
<style>
body{
    font-family: Arial;
    text-align:center;
    margin-top:100px;
    background:#f2f2f2;
}
.box{
    background:white;
    padding:30px;
    width:300px;
    margin:auto;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}
h1{
    color:#333;
}
#count{
    font-size:40px;
    color:green;
}
</style>
</head>
<body>

<div class="box">
<h1>Website Visitors</h1>
<p id="count">Loading...</p>
</div>

<script>
fetch("https://px82h52asa.execute-api.us-east-1.amazonaws.com/VisitorCounterFunction")
.then(response => response.json())
.then(data => {
    document.getElementById("count").innerText = data.count;
});
</script>

</body>
</html>
